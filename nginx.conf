server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.html?$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }

  location ~* \.(js|css|png|jpg|gif|svg|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location ~ /\. { deny all; }
}
