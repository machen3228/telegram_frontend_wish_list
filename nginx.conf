server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             text/javascript text/xml application/xml image/svg+xml;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
  }

  # HTML: always revalidate so deploys are reflected immediately
  location ~* \.html?$ {
    add_header Cache-Control "no-cache";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
  }

  # Vite content-hashed assets: cache forever
  location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~ /\. { deny all; }
}